name: Auto-merge Keystatic PRs

on:
  pull_request:
    branches: [main]

jobs:
  automerge:
    if: startsWith(github.head_ref, 'keystatic/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge
        run: gh pr merge "${{ github.event.pull_request.number }}" --merge --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
